<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
  <title>Transactions</title>
</head>

<body>

<h1>FinTrack Transactions</h1>

<h2>Add Transaction</h2>

<form action="/transactions/save" method="post">

  <label>Title:</label>
  <input type="text" name="title">

  <br><br>

  <label>Amount:</label>
  <input type="number" step="0.01" name="amount">

  <br><br>

  <label>Type:</label>

  <select name="type">
    <option value="INCOME">Income</option>
    <option value="EXPENSE">Expense</option>
  </select>

  <br><br>

  <label>Category:</label>

  <select name="category.id">
    <option value="">-- Select Category --</option>
    <option th:each="cat : ${categories}"
            th:value="${cat.id}"
            th:text="${cat.name}">
    </option>
  </select>

  <button type="submit">Save</button>

</form>

<hr>

<h2>Financial Summary</h2>

<p>
  Total Income:
  <span th:text="${totalIncome}"></span>
</p>

<p>
  Total Expense:
  <span th:text="${totalExpense}"></span>
</p>

<p>
  Current Balance:
  <span th:text="${balance}"></span>
</p>

<hr>

<h2>All Transactions</h2>

<table border="1">

  <tr>
    <th>Title</th>
    <th>Amount</th>
    <th>Type</th>
    <th>Action</th>
  </tr>

  <tr th:each="transaction : ${transactions}">
    <td th:text="${transaction.title}"></td>
    <td th:text="${transaction.amount}"></td>
    <td th:text="${transaction.type}"></td>
    <td>

      <a th:href="@{/transactions/delete/{id}(id=${transaction.id})}">
        Delete
      </a>
    </td>
  </tr>
</table>

</body>
</html>
